<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>

    <link href="index.css" rel="stylesheet">
    <link href="favicon.ico" rel="icon">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="top">
                <embed src="./assets/list.svg" class="list" style="pointer-events: all;">
                <a href="https://pro203s.kr" class="logo">
                    <embed src="./assets/logo.svg">
                </a>
                <div class="right">
                    <div class="searchBox">
                        <input type="text" placeholder="검색" />
                        <button>
                            <embed src="./assets/search.svg">
                        </button>
                        <button class="button" style="margin-left: 10px;">
                            <embed src="./assets/mic.svg">
                        </button>
                    </div>
                    <button class="buttonWithLabel">
                        <embed src="./assets/plus.svg">
                        <span class="label">만들기</span>
                    </button>
                    <button class="button">
                        <embed src="./assets/bell.svg">
                    </button>
                    <button class="profile">
                        <span class="fakeProfile">P</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="left">
            <div class="item">
                <embed src="./assets/home.svg">
            </div>
        </div>
    </div>
</body>

</html>
