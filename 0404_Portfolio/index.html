<!DOCTYPE html>

    <link href="index.css" rel="stylesheet">
    <link href="favicon.ico" rel="icon">
</head>

<body>
    <div class="screen">
        <div class="navigator">
            <a href="#home">
                <img draggable="false" src="./assets/house.svg" alt="홈" title="홈" />
            </a>
            <a href="#projects">
                <img draggable="false" src="./assets/list.svg" alt="프로젝트" title="프로젝트" />

            <a href="#connect">

        <div class="home" id="home">

                </div>
                <div class="row">
                    <div class="properties">
                        <span>React Native</span>
                        <span>Expo</span>
                    </div>
                    <a class="link" href="https://school.pro203s.kr/download" target="_blank" rel="noreferrer">다운로드</a>
                </div>
            </div> 
        </div>
